name: todo_flutter
description: "A todo app built on the RG Design System."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  # Firebase
  cloud_firestore: ^6.6.0
  firebase_auth: ^6.5.4
  firebase_core: ^4.11.0

  flutter:
    sdk: flutter

  # Localization
  flutter_localizations:
    sdk: flutter
  intl: any

  # Design system
  rg_design_system:
    git:
      url: https://github.com/rodrigogaleano/rg-design-system-flutter.git
      ref: main

dev_dependencies:
  flutter_test:
    sdk: flutter
  very_good_analysis: ^10.3.0

flutter:
  uses-material-design: true
  generate: true
